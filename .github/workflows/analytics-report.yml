name: analytics-report

# Cloudflare Web Analytics → 텔레그램 일일 리포트 + 누적 영속화
#
# ⚠️ 스케줄 비활성(2026-07-16). hrinsight4u.com 리포트의 실제 발신처는 eci820/HRstudy 이며,
#    이 저장소의 사본은 CF_ANALYTICS_TOKEN 등 시크릿이 없어 매일 실패(=실패 메일)만 만들었다.
#    코드·누적 데이터(data/analytics-history.json)는 HRstudy 와의 이력 분리 확인 전까지 보존하고,
#    수동 실행(workflow_dispatch)만 남긴다. 되돌리려면 아래 schedule 블록을 복원:
#      schedule:
#        - cron: "0 23 * * *"   # 23:00 UTC == 08:00 KST
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Run analytics report
        run: node scripts/analytics-report.mjs
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # 자동 발견 실패 시에만 시크릿으로 지정(없으면 빈 값 → 스크립트가 자동 탐색)
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_SITE_TAG: ${{ secrets.CF_SITE_TAG }}

      - name: Commit history if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/analytics-history.json
          git diff --staged --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "chore: analytics 누적 갱신 ($(date -u +%F))"
          git push || { git pull --rebase && git push; }
